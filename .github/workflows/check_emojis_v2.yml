name: Validate emojis_v2.json

on:
  pull_request:
    paths:
      - "emojis/emojis_v2.json"
      - "emojis/validate_emojis_v2.py"

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pydantic

      - name: Run validator
        id: validate
        run: |
          set +e
          output=$(python emojis/validate_emojis_v2.py 2>&1)
          status=$?

          echo "status=$status" >> $GITHUB_OUTPUT

          echo "output<<EOF" >> $GITHUB_OUTPUT
          echo "$output" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          exit 0

      - name: Create / update PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const output = `${{ steps.validate.outputs.output }}`;
            const status = Number(`${{ steps.validate.outputs.status }}`);

            const header = "## 🧪 Emoji Validation";
            const body = `\n\`\`\`\n${output}\n\`\`\``;
            const fullComment = header + body;

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const comments = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
            });

            const existing = comments.data.find(c =>
              c.body && c.body.startsWith(header)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body: fullComment,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body: fullComment,
              });
            }

            if (status !== 0) {
              core.setFailed("Emoji validation failed");
            }
